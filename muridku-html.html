<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MURIDKU PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:sans-serif;background:#0f172a;color:white;text-align:center}
.container{max-width:500px;margin:auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:15px;margin-top:20px}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
button{background:#3b82f6;color:white}
.opsi{background:white;color:black;margin:10px;padding:10px;border-radius:10px;cursor:pointer}
</style>
</head>

<body>

<div class="container">

<h1>MURIDKU PRO</h1>

<div id="login">
<button onclick="login()">Login Google</button>
</div>

<div id="dashboard" style="display:none">
<button onclick="show('guru')">Panel Guru</button>
<button onclick="show('murid')">Masuk Ujian</button>
<button onclick="logout()">Logout</button>
</div>

<div id="guru" style="display:none">
<div class="card">
<input id="mapel" placeholder="Mapel">
<input id="room" placeholder="ID Ujian">
<textarea id="soal" placeholder="Soal"></textarea>
<input id="a" placeholder="Jawaban Benar">
<input id="b" placeholder="Salah 1">
<input id="c" placeholder="Salah 2">
<input id="d" placeholder="Salah 3">
<button onclick="tambah()">Tambah Soal</button>
<button onclick="monitor()">Lihat Hasil</button>
</div>
</div>

<div id="murid" style="display:none">
<div class="card">
<input id="nama" placeholder="Nama">
<input id="room2" placeholder="ID Ujian">
<button onclick="mulai()">Mulai</button>
</div>
</div>

<div id="quiz" style="display:none">
<h3 id="q"></h3>
<div id="opsi"></div>
</div>

<div id="hasil" style="display:none">
<h2 id="nilai"></h2>
</div>

<div id="monitor" style="display:none">
<table border="1" style="width:100%;background:white;color:black">
<thead><tr><th>Nama</th><th>Nilai</th><th>Waktu</th></tr></thead>
<tbody id="tabel"></tbody>
</table>
</div>

<div class="card">
<iframe src="https://meet.jit.si/MuridkuKelas"
style="width:100%;height:200px"></iframe>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "ISI_API_KEY_KAMU",
  authDomain: "PROJECT.firebaseapp.com",
  projectId: "PROJECT"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function show(id){
document.querySelectorAll("div[id]").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="block";
}

function login(){
const p=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(p).then(()=>show("dashboard"));
}

function logout(){auth.signOut();location.reload();}

async function tambah(){
const room=document.getElementById("room").value;
const soal={
p:soalEl.value,
o:[
a.value,
b.value,
c.value,
d.value
]
};
await db.collection("ujian").doc(room).collection("soal").add(soal);
alert("soal masuk");
}

let data=[],i=0,benar=0,start;

async function mulai(){
const room=room2.value;
const snap=await db.collection("ujian").doc(room).collection("soal").get();
data=[];snap.forEach(d=>data.push(d.data()));
start=Date.now();
i=0;benar=0;
show("quiz");
next();
}

function next(){
if(i>=data.length)return selesai();
q.innerText=data[i].p;
opsi.innerHTML="";
let arr=data[i].o.map((x,idx)=>({x,benar:idx==0})).sort(()=>Math.random()-0.5);
arr.forEach(o=>{
let b=document.createElement("div");
b.className="opsi";
b.innerText=o.x;
b.onclick=()=>{
if(o.benar)benar++;
i++;next();
};
opsi.appendChild(b);
});
}

async function selesai(){
let skor=Math.round(benar/data.length*100);
let waktu=Math.floor((Date.now()-start)/1000);

await db.collection("ujian").doc(room2.value)
.collection("hasil").add({
nama:nama.value,
skor,waktu
});

nilai.innerText="Nilai: "+skor;
show("hasil");
}

function monitor(){
let room=document.getElementById("room").value;
show("monitor");
db.collection("ujian").doc(room).collection("hasil")
.onSnapshot(s=>{
let html="";
s.forEach(d=>{
let x=d.data();
html+=`<tr><td>${x.nama}</td><td>${x.skor}</td><td>${x.waktu}s</td></tr>`;
});
tabel.innerHTML=html;
});
}
</script>

</body>
</html>
